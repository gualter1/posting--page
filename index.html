<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram da ti</title>
    <link  rel="stylesheet" href="styles.css" >
</head>

<body>
    <header>
        <div id="topo">
            <h2>INSTAGRAM DA TI</h2>
            <p><a href="#postagens">Ultimas postagens</a></p>
        </div>
    </header>
    <main>
        <form>
            <div id="form-entrada">

                <p>Digite um titulo par sua postagem</p>
                <textarea id="meu-titulo" placeholder="Digite um titulo para sua postagem. Sejá criativo"></textarea>
                <p>Digite o texto da sua postagem</p>
                <textarea id="meu-paragrafo"
                placeholder="Agora digite o texto da sua postagem! Após isso clique no botão abaixo para publica-la."></textarea>
                <button id="btn-renderizar">Publicar postagem</button>
            </div>
        </form>
        <h1>> Ultimas postagens</h1>
        
        <section id="postagens"></section>
    </main>
    <footer>
        <p>Instagram da ti. Todos direitos reservados <time>2026</time>.</p>
    </footer>
</body>
<script src="./script.js" defer></script>

</html>
